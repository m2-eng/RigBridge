[pytest]
# Pytest Konfiguration für RigBridge

# Python path
pythonpath = .

# Test-Verzeichnis
testpaths = tests

# Markers für verschiedene Test-Typen
markers =
    protocol: Protokoll-Parser Tests (Stufe 1)
    commands: Befehlsaufbau Tests (Stufe 2)
    usb_sim: USB-Simulation Tests (Stufe 3)
    usb_real: USB Real-Hardware Tests (Stufe 4 - manuell)
    manual: Manuelle Tests (erfordern Hardware/Intervention)
    slow: Langsame Tests (z.B. Hardware-Kommunikation)
    integration: Komponenten-Integration Tests
    asyncio: Async Tests (mit pytest-asyncio)

# Ausgabeoptionen
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Asyncio-Mode für pytest-asyncio
asyncio_mode = auto

# Logging
log_cli = false
log_cli_level = INFO
log_file = tests/pytest.log
log_file_level = DEBUG

# Mindestens Python 3.8
minversion = 3.8

# Bekannte Drittanbieter-Warnungen filtern
filterwarnings =
    ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning:starlette\.formparsers
