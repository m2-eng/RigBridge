# ──────────────────────────────────────────────────────────────────────────────
# docker-compose.yml – RigBridge (Lokale Entwicklungs- und Integrationsumgebung)
#
# Zielplattform: Linux (Produktion und Linux-Entwicklung)
# Windows:       Anwendung wird NATIV gestartet, kein Docker.
#
# USB-Passthrough (Linux):
#   Den devices-Abschnitt im Service einkommentieren und den Pfad
#   auf das tatsaechliche Geraet anpassen (/dev/ttyUSB0, /dev/ttyACM0, ...).
#
# Konfiguration erfolgt ueber config.json; Secrets kommen ueber Secret-Provider.
# ──────────────────────────────────────────────────────────────────────────────

services:
  rigbridge:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   target: runtime

    # Erwartet ein bereits vorhandenes Image (z. B. via `docker load -i ...tar`)
    image: ${RIGBRIDGE_IMAGE:-rigbridge:local-test}
    # Keine Registry-Abfrage erzwingen, wichtig fuer Offline-Betrieb
    pull_policy: never

    container_name: rigbridge
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8080}:8080"
    volumes:
      # Konfigurationsdatei aus dem Host einbinden (read-write fuer UI/API-Updates)
      - ./config.json:/app/config.json
      # Theme-Konfiguration aus dem Host einbinden (read-write fuer Anpassungen)
      - ./theme.css:/app/src/frontend/assets/theme.css
    environment:
      - PYTHONUNBUFFERED=1

    # Geraete-Zugriff fuer USB/Serial (Linux)
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
      - /dev/ttyACM1:/dev/ttyACM1
      # IC-905 USB-Audio (ALSA PCM-Geraete)
      # Capture (RX: IC-905 → Host-Mikrofon) und Playback (TX: Host → IC-905)
      - /dev/snd/pcmC0D0c:/dev/snd/pcmC0D0c
      - /dev/snd/pcmC0D0p:/dev/snd/pcmC0D0p
      - /dev/snd/controlC0:/dev/snd/controlC0

    # Gruppenzugehoerigkeit fuer USB/Serial-Zugriff (dialout GID 20) und Audio (GID 29)
    group_add:
      - "20"  # dialout
      - "29"  # audio

    # ────────────────────────────────────────────────────────────────
    # Sicherheitshaertung
    # ────────────────────────────────────────────────────────────────
    # Privilegien-Eskalation im Container verbieten
    security_opt:
      - no-new-privileges:true

    # Alle Linux-Capabilities entfernen; nur zurueckgeben, was benoetigt wird.
    # NET_BIND_SERVICE nur notwendig, wenn Port < 1024 gebunden wird (hier nicht).
    cap_drop:
      - ALL

    # Root-Dateisystem read-only; beschreibbare Verzeichnisse als tmpfs
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid

    # Ressourcen-Limits (Produktion anpassen)
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, ssl; urllib.request.urlopen('https://localhost:8080/health', context=ssl._create_unverified_context())"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - rigbridge_net

networks:
  rigbridge_net:
    driver: bridge
    internal: false  # true setzen, wenn kein externer Netzwerkzugriff benoetigt wird
