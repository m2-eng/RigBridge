  #     physical_min: 0.0
  #     physical_max: 10.0

  uint8_percent:
    name: "Percentage 0–100%"
    size: 1
    description: "Prozentwert 0–100%, als 0x00–0xFF linear kodiert (0x00=0%, 0xFF=100%)"
    encoding:
      method: "linear_scaled"
    scaling:
      type: "linear"
      unit: "%"
      raw:      { min: 0,   max: 255   }
      physical: { min: 0.0, max: 100.0 }
    range:
      raw_min: 0
      raw_max: 255
      physical_min: 0.0
      physical_max: 100.0
      physical_unit: "%"

  uint8_percent_pos_neg:
    name: "Signed Percentage -100%–+100%"
    size: 1
    description: "Bipolarer Prozentwert −100%–+100%, als 0x00–0xFF kodiert (0x00≈−100%, 0x80=0%, 0xFF=+100%)"
    encoding:
      method: "linear_scaled"
    scaling:
      type: "linear_bipolar"
      unit: "%"
      center:   { raw: 0x80, physical: 0.0 }
      raw:      { min: 0,    max: 255      }
      physical: { min: -100.0, max: 100.0  }
      note: "Leichte Asymmetrie: (0x00→≈−100.8%). Mittelwert 0x80 entspricht exakt 0%."
    range:
      raw_min: 0
      raw_max: 255
      physical_min: -100.0
      physical_max: 100.0
      physical_unit: "%"

  uint8_cw_pitch:
    name: "CW Pitch Frequency 300–900 Hz"
    size: 1
    description: "CW-Tonfrequenz 300–900 Hz, als 0x00–0xFF linear kodiert (0x00=300 Hz, 0x80=600 Hz, 0xFF=900 Hz)"
    encoding:
      method: "linear_scaled"
    scaling:
      type: "linear"
      unit: "Hz"
      raw:      { min: 0,     max: 255   }
      physical: { min: 300.0, max: 900.0 }
    range:
      raw_min: 0
      raw_max: 255
      physical_min: 300.0
      physical_max: 900.0
      physical_unit: "Hz"

  uint8_keyer_speed:
    name: "CW Keyer Speed 6–48 WPM"
    size: 1
    description: "CW-Gebegeschwindigkeit 6–48 WPM, als 0x00–0xFF linear kodiert (0x00=6 WPM, 0xFF=48 WPM)"
    encoding:
      method: "linear_scaled"
    scaling:
      type: "linear"
      unit: "WPM"
      raw:      { min: 0,    max: 255  }
      physical: { min: 6.0,  max: 48.0 }
    range:
      raw_min: 0
      raw_max: 255
      physical_min: 6.0
      physical_max: 48.0
      physical_unit: "WPM"

  uint8_breakin_delay:
    name: "CW Break-in Delay 2.0–13.0 dot-lengths"
    size: 1
    description: "CW Break-in Verzögerung 2.0–13.0 Punktlängen (d), als 0x00–0xFF linear kodiert (0x00=2.0d, 0xFF=13.0d)"
    encoding:
      method: "linear_scaled"
    scaling:
      type: "linear"
      unit: "d"
      raw:      { min: 0,    max: 255  }
      physical: { min: 2.0,  max: 13.0 }
    range:
      raw_min: 0
      raw_max: 255
      physical_min: 2.0
      physical_max: 13.0
      physical_unit: "d"

