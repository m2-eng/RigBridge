# Icom CI-V Data Types
# Common data types used across Icom radio protocols
# These are shared between different Icom radio models (IC-905, IC-7300, etc.)
# All commented data types are not yet reviewed

data_types:
  status_ok_ng:
      name: "transaction_status"
      size: 1
      description: "Returns either success or error response (mutually exclusive)"
      encoding: "bytes"
      bytes:
        - name: "status"
          encoding: "enum"
          index: 0
          length: 1
          values:
            0xFB: "OK"
            0xFA: "ERROR"

  # Basic data types
  boolean:
    size: 1
    description: "Single byte boolean value for all ON/OFF, Open/Close, sharp/soft, ... settings"
    encoding: "enum"
    values:
      false: 0x00
      true: 0x01

  uint8:
    size: 1
    description: "Single byte 0x00-0xFF"
    encoding: "direct"
    range:
      min: 0
      max: 255

  # percent values (0-100%)
  uint8_percent:
    size: 2
    description: "Prozentwert 0–100%, als 0x0000–0xFFFF linear kodiert (0x0000=0%, 0xFFFF=100%)"
    encoding: "linear_scaled"
    scaling:
      raw:      [0, 255]
      physical: [0.0, 100.0]
    range:
      raw_min: 0
      raw_max: 255
      physical_min: 0.0
      physical_max: 100.0
      physical_unit: "%"

  uint8_percent_pos_neg:
    size: 2
    description: "Bipolarer Prozentwert −100%–+100%, als 0x00–0xFF kodiert (0x00≈−100%, 0x80=0%, 0xFF=+100%)"
    encoding: "linear_scaled"
    scaling:
      raw:      [0, 128, 255]
      physical: [-100.0, 0.0, 100.0]
    range:
      raw_min: 0
      raw_max: 255
      physical_min: -100.0
      physical_max: 100.0
      physical_unit: "%"

  # frequency data types
  bcd3_freq:
    name: "frequency"
    size: 3
    description: "3-Byte BCD-kodierte Frequenz (6 Dezimalstellen), Auflösung 100 Hz, Bereich 0–99.9999 MHz"
    encoding: "bcd_packed"
    bytes:
      - index: 0
        high_nibble: { place: "1kHz",   weight: 1000 }
        low_nibble:  { place: "100Hz",  weight: 100  }
      - index: 1
        high_nibble: { place: "100kHz", weight: 100000 }
        low_nibble:  { place: "10kHz",  weight: 10000  }
      - index: 2
        high_nibble: { place: "10MHz",  weight: 10000000 }
        low_nibble:  { place: "1MHz",   weight: 1000000  }

  bcd5_freq:
    name: "frequency"
    size: 5
    description: "5-Byte BCD-kodierte Frequenz (10 Dezimalstellen), Auflösung 1 Hz, Bereich 0–9.999999999 GHz"
    encoding: "bcd_packed"
    bytes:
      - index: 0
        high_nibble: { place: "10Hz",   weight: 10 }
        low_nibble:  { place: "1Hz",    weight: 1  }
      - index: 1
        high_nibble: { place: "1kHz",   weight: 1000 }
        low_nibble:  { place: "100Hz",  weight: 100  }
      - index: 2
        high_nibble: { place: "100kHz", weight: 100000 }
        low_nibble:  { place: "10kHz",  weight: 10000  }
      - index: 3
        high_nibble: { place: "10MHz",  weight: 10000000 }
        low_nibble:  { place: "1MHz",   weight: 1000000  }
      - index: 4
        high_nibble: { place: "1GHz",   weight: 1000000000 }
        low_nibble:  { place: "100MHz", weight: 100000000  }

  bcd6_freq:
    name: "frequency"
    size: 6
    description: "6-Byte BCD-kodierte Frequenz (12 Dezimalstellen), Auflösung 1 Hz, Bereich 0–99.999999999 GHz (10-GHz-Band)"
    encoding: "bcd_packed"
    bytes:
      - index: 0
        high_nibble: { place: "10Hz",   weight: 10 }
        low_nibble:  { place: "1Hz",    weight: 1  }
      - index: 1
        high_nibble: { place: "1kHz",   weight: 1000 }
        low_nibble:  { place: "100Hz",  weight: 100  }
      - index: 2
        high_nibble: { place: "100kHz", weight: 100000 }
        low_nibble:  { place: "10kHz",  weight: 10000  }
      - index: 3
        high_nibble: { place: "10MHz",  weight: 10000000 }
        low_nibble:  { place: "1MHz",   weight: 1000000  }
      - index: 4
        high_nibble: { place: "1GHz",   weight: 1000000000 }
        low_nibble:  { place: "100MHz", weight: 100000000  }
      - index: 5
        high_nibble: { place: "100GHz", weight: 100000000000 }
        low_nibble:  { place: "10GHz",  weight: 10000000000  }
    note: "Für das 10-GHz-Band (IC-905). Byte 5 wird nur bei ≥10 GHz genutzt."

