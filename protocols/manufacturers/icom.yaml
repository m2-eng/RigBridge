# Icom CI-V Data Types
# Common data types used across Icom radio protocols
# These are shared between different Icom radio models (IC-905, IC-7300, etc.)
# All commented data types are not yet reviewed

data_types:
  bcd3_freq:
    name: "3-Byte BCD Frequency"
    size: 3
    description: "BCD-kodierte Frequenz (6 Dezimalstellen), Auflösung 100 Hz, Bereich 0–99.9999 MHz"
    resolution_hz: 100
    bytes:
      - index: 0
        high_nibble: { place: "1kHz",   weight_hz: 1000 }
        low_nibble:  { place: "100Hz",  weight_hz: 100  }
      - index: 1
        high_nibble: { place: "100kHz", weight_hz: 100000 }
        low_nibble:  { place: "10kHz",  weight_hz: 10000  }
      - index: 2
        high_nibble: { place: "10MHz",  weight_hz: 10000000 }
        low_nibble:  { place: "1MHz",   weight_hz: 1000000  }
    encoding:
      method: "bcd_packed"
      byte_order: "little_endian"
      example: "44.5000 MHz → 00 50 44"

  bcd5_freq:
    name: "5-Byte BCD Frequency"
    size: 5
    description: "BCD-kodierte Frequenz (10 Dezimalstellen), Auflösung 1 Hz, Bereich 0–9.999999999 GHz"
    resolution_hz: 1
    bytes:
      - index: 0
        high_nibble: { place: "10Hz",   weight_hz: 10 }
        low_nibble:  { place: "1Hz",    weight_hz: 1  }
      - index: 1
        high_nibble: { place: "1kHz",   weight_hz: 1000 }
        low_nibble:  { place: "100Hz",  weight_hz: 100  }
      - index: 2
        high_nibble: { place: "100kHz", weight_hz: 100000 }
        low_nibble:  { place: "10kHz",  weight_hz: 10000  }
      - index: 3
        high_nibble: { place: "10MHz",  weight_hz: 10000000 }
        low_nibble:  { place: "1MHz",   weight_hz: 1000000  }
      - index: 4
        high_nibble: { place: "1GHz",   weight_hz: 1000000000 }
        low_nibble:  { place: "100MHz", weight_hz: 100000000  }
    encoding:
      method: "bcd_packed"
      byte_order: "little_endian"
      example: "144.500 MHz → 00 00 50 44 01"

  bcd6_freq:
    name: "6-Byte BCD Frequency"
    size: 6
    description: "BCD-kodierte Frequenz (12 Dezimalstellen), Auflösung 1 Hz, Bereich 0–99.999999999 GHz (10-GHz-Band)"
    resolution_hz: 1
    bytes:
      - index: 0
        high_nibble: { place: "10Hz",   weight_hz: 10 }
        low_nibble:  { place: "1Hz",    weight_hz: 1  }
      - index: 1
        high_nibble: { place: "1kHz",   weight_hz: 1000 }
        low_nibble:  { place: "100Hz",  weight_hz: 100  }
      - index: 2
        high_nibble: { place: "100kHz", weight_hz: 100000 }
        low_nibble:  { place: "10kHz",  weight_hz: 10000  }
      - index: 3
        high_nibble: { place: "10MHz",  weight_hz: 10000000 }
        low_nibble:  { place: "1MHz",   weight_hz: 1000000  }
      - index: 4
        high_nibble: { place: "1GHz",   weight_hz: 1000000000 }
        low_nibble:  { place: "100MHz", weight_hz: 100000000  }
      - index: 5
        high_nibble: { place: "100GHz", weight_hz: 100000000000 }
        low_nibble:  { place: "10GHz",  weight_hz: 10000000000  }
    encoding:
      method: "bcd_packed"
      byte_order: "little_endian"
      example: "10.000 GHz → 00 00 00 00 00 01"
    note: "Für das 10-GHz-Band (IC-905). Byte 5 wird nur bei ≥10 GHz genutzt."

  operating_mode:
    name: "Operating Mode"
    size: 2
    description: "Betriebsart und Filterauswahl jeweils als 1-Byte-Enum-Wert"
    bytes:
      - index: 0
        role: "mode"
        description: "Betriebsart (LSB, USB, AM, FM, …)"
      - index: 1
        role: "filter"
        description: "Filterauswahl (FIL1, FIL2, FIL3)"
    encoding:
      method: "enum_pair"
    values:
      modes:
        0x00: "LSB"
        0x01: "USB"
        0x02: "AM"
        0x03: "CWR"
        0x04: "RTTY"
        0x05: "FM"
        0x07: "CW-R"
        0x08: "RTTY-R"
        0x17: "DV"
        0x22: "DD"
        0x23: "ATV"
      filters:
        0x00: "FIL1"
        0x01: "FIL2"
        0x02: "FIL3"

  uint8:
    name: "Unsigned 8-bit Integer"
    size: 1
    description: "Single byte 0x00-0xFF"
    encoding:
      method: "direct"
    range:
      min: 0
      max: 255

