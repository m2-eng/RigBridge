  # other data types
  attenuator_enum:
    name: "Attenuator Setting"
    size: 1
    description: "Attenuator setting encoded as 1-Byte Enum values for OFF and 10dB"
    encoding: "bytes"
    bytes:
      - index: 0
        length: 1
        name: "attenuator_setting"
        encoding: "enum"
        values:
          0x00: "attenuator OFF"
          0x10: "10dB attenuator setting"

  # IMPORTANT, TODO: Syntax change; Use this as draft for other datatypes
  operating_mode:
    name: "Operating Mode"
    size: 2
    description: "Betriebsart und Filterauswahl jeweils als 1-Byte-Enum-Wert"
    encoding: "bytes"
    bytes:
      - index: 0
        length: 1
        name: "mode"
        encoding: "enum"
        values:
          0x00: "LSB"
          0x01: "USB"
          0x02: "AM"
          0x03: "CWR"
          0x04: "RTTY"
          0x05: "FM"
          0x07: "CW-R"
          0x08: "RTTY-R"
          0x17: "DV"
          0x22: "DD"
          0x23: "ATV"
        description: "Betriebsart (LSB, USB, AM, FM, …)"
      - index: 1
        length: 1
        name: "filter"
        encoding: "enum"
        values:
          0x01: "FIL1"
          0x02: "FIL2"
          0x03: "FIL3"
        description: "Filterauswahl (FIL1, FIL2, FIL3)"

