      request:
        structure: []
      response: *status_ok_ng

    clear_select_channel_setting:
      cmd: 0x0E
      subcmd: 0xB0
      description: "Clear the Select channel setting"
      request:
        structure: []
      response: *status_ok_ng

    set_as_select_channel:
      cmd: 0x0E
      subcmd: 0xB1
      description: "Set as select channel"
      request:
        structure: []
      response: *status_ok_ng

    set_select_channel:
      cmd: 0x0E
      subcmd: 0xB1
      description: "Set the channel as select channel (1-3)"
      request:
        structure:
          - name: "channel"
            type: "uint8"
            description: "Channel selection (1-3)"
            enum:
              0x01: "Select channel 1"
              0x02: "Select channel 2"
              0x03: "Select channel 3"
      response: *status_ok_ng

    set_select_memory_scan_channel:
      cmd: 0x0E
      subcmd: 0xB2
      description: "Set the Select memory scan channel all"
      request:
        structure:
          - name: "channel"
            type: "uint8"
            description: "Channel selection"
            enum:
              0x00: "All channels"
              0x01: "Select channel 1"
              0x02: "Select channel 2"
              0x03: "Select channel 3"
      response: *status_ok_ng

    set_scan_resume_off:
      cmd: 0x0E
      subcmd: 0xD0
      description: "Set Scan resume OFF"
      request:
        structure: []
      response: *status_ok_ng

    set_scan_resume_on:
      cmd: 0x0E
      subcmd: 0xD3
      description: "Set Scan resume ON (Close&Delay)"
      request:
        structure: []
      response: *status_ok_ng

    # ========================================================================
    # SPLIT/DUPLEX COMMANDS (0x0F)
    # ========================================================================

    read_split_duplex_status:
      cmd: 0x0F
      subcmd: null
      description: "Set split OFF"
      request:
        structure: []
      response:
        structure:
          - name: "channel"
            type: "uint8"
            description: "Channel selection (1-3)"
            enum:
              0x00: "Read Split OFF setting"
              0x01: "Read Split ON setting"
              0x11: "Read DUP- operation"
              0x12: "Read DUP+ operation"
              0x13: "Read DD Repeater Simplex mode (RPS)"

    set_split_off:
      cmd: 0x0F
      subcmd: 0x00
      description: "Set split OFF"
      request:
        structure: []
      response: *status_ok_ng

    set_split_on:
      cmd: 0x0F
      subcmd: 0x01
      description: "Set split ON"
      request:
        structure: []
      response: *status_ok_ng

    set_simplex:
      cmd: 0x0F
      subcmd: 0x10
      description: "Set simplex operation"
      request:
        structure: []
      response: *status_ok_ng

    set_duplex_minus:
      cmd: 0x0F
      subcmd: 0x11
      description: "Set DUP- operation"
      request:
        structure: []
      response: *status_ok_ng

    set_duplex_plus:
      cmd: 0x0F
      subcmd: 0x12
      description: "Set DUP+ operation"
      request:
        structure: []
      response: *status_ok_ng

    set_dd_repeater_simplex:
      cmd: 0x0F
      subcmd: 0x13
      description: "Set DD Repeater Simplex mode (RPS)"
      request:
        structure: []
      response: *status_ok_ng

    # ========================================================================
    # TUNING STEP (0x10)
    # ========================================================================
    tuning_step_enum: &tuning_step_enum
      0x00: "OFF(10Hz/1Hz)"
      0x01: "100Hz"
      0x02: "500Hz"
      0x03: "1kHz"
      0x04: "5kHz"
      0x05: "6.25kHz"
      0x06: "10kHz"
      0x07: "12.5kHz"
      0x08: "20kHz"
      0x09: "25kHz"
      0x0A: "50kHz"
      0x0B: "100kHz"
      0x0C: "500kHz"

    read_tuning_step:
      cmd: 0x10
      subcmd: null
      description: "Read tuning step"
      request:
        structure: []
      response:
        structure:
          - name: "step"
            type: "uint8"
            description: "Channel selection (1-3)"
            enum: *tuning_step_enum

    set_tuning_step:
      cmd: 0x10
      subcmd: null
      description: "Send tuning step"
      request:
        structure:
          - name: "step"
            type: "uint8"
            enum: *tuning_step_enum
      response: *status_ok_ng

    # ========================================================================
    # ATTENUATOR (0x11)
    # ========================================================================
    attenuator_enum: &attenuator_enum
      0x00: "attenuator OFF"
      0x10: "10dB attenuator setting"

    read_attenuator:
      cmd: 0x11
      subcmd: null
      description: "Attenuator OFF"
      request:
        structure: []
      response:
        structure:
          - name: "step"
            type: "uint8"
            description: "Channel selection (1-3)"
            enum: *attenuator_enum

    send_attenuator_off:
      cmd: 0x11
      subcmd: null
      description: "Attenuator OFF"
      request:
        structure:
          - name: "step"
            type: "uint8"
            enum: *attenuator_enum
      response: *status_ok_ng

