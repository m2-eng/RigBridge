# Icom IC-905 Complete Protocol Definition
# CI-V Protocol - All commands from IC-905 CI-V Reference Guide
# Based on official Icom CI-V Protocol Reference
# All commented commands are not yet reviewed

# command not yet implemented
# 1C 03
# 1E 01
# 1E 03
# 0E Ax

protocol:
  name: "Icom IC-905"
  model: "ic905"
  manufacturer: "Icom"
  description: "Multi-band transceiver with complete CI-V command set"

  config:
    timeouts:
      command_response: 1.0
      session_idle: 300.0

    frame:
      preamble: [0xFE, 0xFE]
      terminator: 0xFD
      default_controller: 0xE0
      default_radio: 0xAC

  addresses:
    controller: 0xE0
    radio: 0xA4

  # templates for common request or response patterns
  templates:
    status_ok_ng: &status_ok_ng
      type: "alternatives"
      description: "Returns either success or error response (mutually exclusive)"
      alternatives:
        - name: "success"
          value: 0xFB
          description: "Command executed successfully"
        - name: "error"
          value: 0xFA
          description: "Command failed or invalid parameter"

    band_edge_bcd5: &band_edge_bcd5
      type: "structure"
      description: "Band edge frequencies using 5-byte BCD format"
      structure:
        - name: "edge_number"
          type: "uint8"
          offset: 0
          length: 1
        - name: "lower_edge"
          type: "bcd5_freq"
          offset: 1
          length: 5
        - name: "separator"
          type: "fixed_byte"
          value: 0x2D
          offset: 6
          length: 1
        - name: "higher_edge"
          type: "bcd5_freq"
          offset: 7
          length: 5

    band_edge_bcd6: &band_edge_bcd6
      type: "structure"
      description: "Band edge frequencies using 6-byte BCD format"
      structure:
        - name: "edge_number"
          type: "uint8"
          offset: 0
          length: 1
        - name: "lower_edge"
          type: "bcd6_freq"
          offset: 1
          length: 6
        - name: "separator"
          type: "fixed_byte"
          value: 0x2D
          offset: 7
          length: 1
        - name: "higher_edge"
          type: "bcd6_freq"
          offset: 8
          length: 6

  # Command definitions based on IC-905 CI-V Reference Guide
  commands:

    # ========================================================================
    # TRANSCEIVE COMMANDS (0x00-0x01)
    # ========================================================================
    send_frequency_data:
      cmd: 0x00
      subcmd: null
      description: "Send frequency data (transceive)"
      request:
        alternatives:
          - name: "frequency"
            type: "bcd5_freq"
            description: "Operating frequency to send"
          - name: "frequency"
            type: "bcd6_freq"
            description: "Operating frequency to send (10 GHz band)"
      response: *status_ok_ng

    send_mode_data:
      cmd: 0x01
      subcmd: null
      description: "Send mode data (transceive)"
      request:
        structure:
          - name: "operating mode"
            type: "operating_mode"
            description: "Send the mode data (transceive)"
      response: *status_ok_ng

    # ========================================================================
    # READ COMMANDS (0x02-0x04)
    # ========================================================================
    read_band_edge:
      cmd: 0x02
      subcmd: null
      description: "Read the band edge frequencies"
      request:
        structure: []
      response:
        alternatives:
          - structure: *band_edge_bcd5
          - structure: *band_edge_bcd6

    read_operating_frequency:
      cmd: 0x03
      subcmd: null
      description: "Read operating frequency"
      request:
        structure: []
      response:
        alternatives:
          - name: "frequency"
            type: "bcd5_freq"
            description: "Read the operating frequency in BCD"
          - name: "frequency"
            type: "bcd6_freq"
            description: "Read the operating frequency in BCD (10 GHz band)"

    read_operating_mode:
      cmd: 0x04
      subcmd: null
      description: "Read operating mode"
      request:
        structure: []
      response:
        structure:
          - name: "operating mode"
            type: "operating_mode"
            description: "Read the operating mode and filter setting"

    # ========================================================================
    # SET COMMANDS (0x05-0x06)
    # ========================================================================
    set_operating_frequency:
      cmd: 0x05
      subcmd: null
      description: "Set operating frequency"
      request:
        alternatives:
          - name: "frequency"
            type: "bcd5_freq"
            description: "Operating frequency to set"
          - name: "frequency"
            type: "bcd6_freq"
            description: "Operating frequency to set (10 GHz band)"
      response: *status_ok_ng

    set_operating_mode:
      cmd: 0x06
      subcmd: null
      description: "Set operating mode and filter"
      request:
        structure:
          - name: "operating mode"
            type: "operating_mode"
            description: "Set the operating mode and filter setting"
      response: *status_ok_ng

    # ========================================================================
    # VFO COMMANDS (0x07)
    # ========================================================================
    select_vfo_mode:
      cmd: 0x07
      subcmd: null
      description: "Select the VFO mode"
      request:
        structure: []
      response: *status_ok_ng

    select_vfo_a:
      cmd: 0x07
      subcmd: 0x00
      description: "Select VFO A"
      request:
        structure: []
      response: *status_ok_ng

    select_vfo_b:
      cmd: 0x07
      subcmd: 0x01
      description: "Select VFO B"
      request:
        structure: []
      response: *status_ok_ng

    equalize_vfo:
      cmd: 0x07
      subcmd: 0xA0
      description: "Equalize VFO A and VFO B"
      request:
        structure: []
      response: *status_ok_ng

    exchange_vfo:
      cmd: 0x07
      subcmd: 0xB0
      description: "Exchange VFO A and VFO B"
      request:
        structure: []
      response: *status_ok_ng

    # ========================================================================
    # MEMORY COMMANDS (0x08-0x0B)
    # ========================================================================
    select_memory_mode:
      cmd: 0x08
      subcmd: null
      description: "Select the Memory mode"
      request:
        structure: []
      response: *status_ok_ng

    # select_memory_channel:
    #   cmd: 0x08
    #   subcmd: null
    #   description: "Select the Memory channel (0000-0099) or call channel"
    #   request:
    #     structure:
    #       - name: "channel_high"
    #         type: "uint8_0_99"
    #         description: "Channel high byte (BCD)"
    #       - name: "channel_low"
    #         type: "uint8_0_99"
    #         description: "Channel low byte (BCD)"
    #   response: *status_ok_ng

    # select_memory_group:
    #   cmd: 0x08
    #   subcmd: 0xA0
    #   description: "Select the Memory group (0000-0099) or call channel group (0100)"
    #   request:
    #     structure:
    #       - name: "group_high"
    #         type: "uint8_0_99"
    #         description: "Group high byte (BCD)"
    #       - name: "group_low"
    #         type: "uint8_0_99"
    #         description: "Group low byte (BCD)"
    #   response: *status_ok_ng

    memory_write:
      cmd: 0x09
      subcmd: null
      description: "Write to memory"
      request:
        structure: []
      response: *status_ok_ng

    memory_to_vfo:
      cmd: 0x0A
      subcmd: null
      description: "Copy memory to VFO"
      request:
        structure: []
      response: *status_ok_ng

    memory_clear:
      cmd: 0x0B
      subcmd: null
      description: "Clear memory"
      request:
        structure: []
      response: *status_ok_ng

    # ========================================================================
    # OFFSET COMMANDS (0x0C-0x0D)
    # ========================================================================
    read_frequency_offset:
      cmd: 0x0C
      subcmd: null
      description: "Read duplex offset frequency"
      request:
        structure: []
      response:
        structure:
          - name: "offset"
            type: "bcd3_freq"
            description: "Duplex offset frequency in BCD"

    send_frequency_offset:
      cmd: 0x0D
      subcmd: null
      description: "Set duplex offset frequency"
      request:
        structure:
          - name: "offset"
            type: "bcd3_freq"
            description: "Duplex offset frequency in BCD"
      response: *status_ok_ng

    # ========================================================================
    # SCAN COMMANDS (0x0E)
    # ========================================================================
    cancel_scan:
      cmd: 0x0E
      subcmd: 0x00
      description: "Cancel scan"
      request:
        structure: []
      response: *status_ok_ng

    start_program_memory_scan:
      cmd: 0x0E
      subcmd: 0x01
      description: "Start a programmed/memory scan"
      request:
        structure: []
      response: *status_ok_ng

    start_program_scan:
      cmd: 0x0E
      subcmd: 0x02
      description: "Start a programmed scan"
      request:
          structure: []
      response: *status_ok_ng

    start_df_scan:
      cmd: 0x0E
      subcmd: 0x03
      description: "Start a ΔF scan"
      request:
        structure: []
      response: *status_ok_ng

    start_program_scan_fine:
      cmd: 0x0E
      subcmd: 0x12
      description: "Start a Fine programmed scan"
      request:
        structure: []
      response: *status_ok_ng

    start_df_scan_fine:
      cmd: 0x0E
      subcmd: 0x13
      description: "Start a Fine ΔF scan"
      request:
        structure: []
      response: *status_ok_ng

    start_memory_scan:
      cmd: 0x0E
      subcmd: 0x22
      description: "Start a memory scan"
      request:
        structure: []
      response: *status_ok_ng

    start_select_memory_scan:
      cmd: 0x0E
      subcmd: 0x23
      description: "Start a select memory scan"
      request:
        structure: []
      response: *status_ok_ng

    start_mode_select_scan:
      cmd: 0x0E
      subcmd: 0x24
      description: "Start a Mode Select scan"
      request:
        structure: []
      response: *status_ok_ng

    select_df_scan_span_5khz:
      cmd: 0x0E
      subcmd: 0xA1
      description: "Select ΔF scan span (±5kHz)"
      request:
        structure: []
      response: *status_ok_ng

    select_df_scan_span_10khz:
      cmd: 0x0E
      subcmd: 0xA2
      description: "Select ΔF scan span (±10kHz)"
      request:
        structure: []
      response: *status_ok_ng

    select_df_scan_span_20khz:
      cmd: 0x0E
      subcmd: 0xA3
      description: "Select ΔF scan span (±20kHz)"
      request:
        structure: []
      response: *status_ok_ng

    select_df_scan_span_50khz:
      cmd: 0x0E
      subcmd: 0xA4
      description: "Select ΔF scan span (±50kHz)"
      request:
        structure: []
      response: *status_ok_ng

    select_df_scan_span_100khz:
      cmd: 0x0E
      subcmd: 0xA5
      description: "Select ΔF scan span (±100kHz)"
      request:
        structure: []
      response: *status_ok_ng

    select_df_scan_span_500khz:
      cmd: 0x0E
      subcmd: 0xA6
      description: "Select ΔF scan span (±500kHz)"
      request:
        structure: []
      response: *status_ok_ng

    select_df_scan_span_1mhz:
      cmd: 0x0E
